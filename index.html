<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>XQ Messenger | Email OTP Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --xq-bg: #090b10;
            --xq-side: #12161f;
            --xq-primary: #5865f2;
            --xq-accent: #00d997;
            --xq-text: #f1f1f1;
            --xq-grad: linear-gradient(135deg, #5865f2 0%, #a052ff 100%);
        }

        body { font-family: 'Outfit', sans-serif; background: var(--xq-bg); color: var(--xq-text); margin: 0; display: flex; height: 100vh; justify-content: center; align-items: center; }

        .auth-card {
            background: var(--xq-side); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .xq-input {
            width: 100%; background: #090b10; border: 1px solid #2d3436; color: white;
            padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 1rem; text-align: center;
        }

        .btn-xq {
            width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--xq-grad);
            color: white; font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        .btn-xq:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* reCAPTCHA Layout */
        #recaptcha-container { margin: 15px 0; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="auth-card" id="email-step">
        <h1 style="color:var(--xq-primary)">XQ ULTRA</h1>
        <p>E-posta adresinize giriş kodu gönderilecek</p>
        <input type="email" id="userEmail" class="xq-input" placeholder="mail@example.com">
        <div id="recaptcha-container"></div>
        <button class="btn-xq" onclick="sendEmailOTP()">GİRİŞ KODU GÖNDER</button>
    </div>

    <div class="auth-card" id="otp-step" style="display:none;">
        <h1>DOĞRULAMA</h1>
        <p>E-postanızdaki kodu veya bağlantıyı onaylayın</p>
        <div id="status-msg" style="color:var(--xq-accent); margin-bottom: 10px;">Giriş bekleniyor...</div>
        <p style="font-size: 0.8rem; color: #949ba4;">Not: Firebase Email Link sistemi maildeki bağlantıya tıklamanızı gerektirir.</p>
        <button class="btn-xq" style="background:#2d3436" onclick="location.reload()">Geri Dön</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQdsC8VuoBnFyOLWavV3C8GXomSzDXUzw",
            authDomain: "des-store-c93e0.firebaseapp.com",
            projectId: "des-store-c93e0",
            storageBucket: "des-store-c93e0.firebasestorage.app",
            messagingSenderId: "180864238268",
            appId: "1:180864238268:web:7220a8a2496a7d622606b9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const actionCodeSettings = {
            url: window.location.href, // Kullanıcının tıklayınca döneceği yer
            handleCodeInApp: true
        };

        // 1. Giriş Maili Gönder
        window.sendEmailOTP = function() {
            const email = document.getElementById('userEmail').value;
            if(!email) return alert("Mail gir!");

            sendSignInLinkToEmail(auth, email, actionCodeSettings)
                .then(() => {
                    // Mail adresini yerel depolamaya kaydet (güvenlik için gerekli)
                    window.localStorage.setItem('emailForSignIn', email);
                    
                    document.getElementById('email-step').style.display = 'none';
                    document.getElementById('otp-step').style.display = 'block';
                    alert("Giriş bağlantısı mail adresine gönderildi!");
                })
                .catch((error) => {
                    alert("Hata: " + error.message);
                });
        };

        // 2. Bağlantıyı Kontrol Et (Giriş Yapılmış mı?)
        if (isSignInWithEmailLink(auth, window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn');
            
            // Eğer kullanıcı cihaz değiştirirse maili tekrar sor
            if (!email) {
                email = window.prompt('Lütfen doğrulama için e-postanızı tekrar girin:');
            }

            signInWithEmailLink(auth, email, window.location.href)
                .then((result) => {
                    window.localStorage.removeItem('emailForSignIn');
                    alert("XQ Ultra Sistemine Giriş Başarılı!");
                    // Buradan ana panele yönlendir
                    // window.location.href = "dashboard.html";
                })
                .catch((error) => {
                    console.error("Giriş Hatası:", error);
                });
        }
    </script>
</body>
</html>
