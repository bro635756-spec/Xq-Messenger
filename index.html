<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>XQ Messenger Ultra | Siber Güvenlik</title>
    <style>
        body { background: #050608; color: #e1e1e1; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0e1117; padding: 30px; border-radius: 20px; width: 450px; border: 1px solid #1f232c; }
        .scroll-box { background: #000; height: 150px; overflow-y: scroll; padding: 10px; font-size: 0.8rem; margin: 15px 0; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }
        button { width: 100%; padding: 15px; background: #5865f2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>
    <div class="card" id="authBox">
        <h2>XQ STUDIO GİRİŞ</h2>
        <div class="scroll-box" id="legalText">Yükleniyor...</div>
        <label><input type="checkbox" id="accept"> Anayasal maddeleri kabul ediyorum.</label>
        <input type="email" id="email" placeholder="E-posta adresiniz">
        <button id="sendBtn" disabled>9 HANELİ KOD GÖNDER</button>
        <div id="otpArea" style="display:none">
            <input type="number" id="otpInput" placeholder="000 000 000">
            <button id="verifyBtn">SİSTEME GİRİŞ</button>
        </div>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
